# i18n skeleton — copy and adapt for EN + ES
# 
# Pattern: add @Message("Default EN") String method_name(); to your MessageBundle interface
#          add method_name=Spanish text to _es.properties
#          add method_name=English text to .properties (canonical)
#
# Template usage: {i18n:method_name}  or  {i18n:method_with_param(value)}
# Never hardcode user-visible strings in templates or Java code.

# --- Page metadata ---
mypage_page_title=My Page · AppName
mypage_subtitle=Discover
mypage_hero_title=Page Hero Title
mypage_section_title=Items

# --- Period toggle ---
mypage_period_daily=Today
mypage_period_weekly=This week
mypage_period_monthly=This month

# --- Show more/less toggle ---
mypage_show_more=Show more
mypage_show_less=Show less

# --- States ---
mypage_empty=No items found. Check back later.
mypage_by_author=by {author}
mypage_no_description=No description available
